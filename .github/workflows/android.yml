name: Android CI
on:
  push:
    branches-ignore:
      - 'l10n_v3_openjdk2'
  pull_request:
    branches-ignore:
      - 'l10n_v3_openjdk2'
    types: [ opened, reopened ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9

      - name: Build JRE JAR files
        run: |
          ./scripts/languagelist_updater.sh
          mkdir out
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK components (platform 35, build-tools 35.0.0, pinned NDK)
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" "ndk;25.2.9519653"

      - name: Build Debug APK (no bundled runtime)
        run: |
          gradle :app_pojavlauncher:assembleDebug --stacktrace
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk

      - name: Run unit tests
        run: |
          gradle :app_pojavlauncher:testDebugUnitTest --stacktrace

      - name: Check Kotlin style
        run: |
          gradle :app_pojavlauncher:ktlintCheck --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app_pojavlauncher/build/test-results/testDebugUnitTest/
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: out/app-debug.apk
          retention-days: 7
